{% extends "base.html" %}

{% block title %} {{ page.title }} {% endblock title%}

{% block content %}
<section class="web__body">
  <div class="hero-body">
    <div class="container">
      <h1 class="title">
        {{ page.title }}
      </h1>
      <p class="subtitle">Last updated: <strong>{{ page.date }}</strong></p>
      {{ page.content | safe }}
    </div>
  </div>
</section>
{% endblock content %}
